<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="1000s Coin flip">
    <title>Coin flip · 1000s</title>
    <script>
        (function(){
            var p = new URLSearchParams(window.location.search);
            window.__COINFLIP_TOKEN__ = (p.get('token') === 'bux') ? 'bux' : 'knukl';
            if (window.self !== window.top) {
                document.documentElement.classList.add('coinflip-embedded');
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="slots.css?v=8">
    <link rel="stylesheet" href="coinflip.css">
    <style>
        html.coinflip-embedded .navbar { display: none !important; }
        html.coinflip-embedded body, html.coinflip-embedded .coinflip-page { padding-top: 0 !important; margin-top: 0 !important; }
        html.coinflip-embedded .coinflip-container { padding-top: 0 !important; }
    </style>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script type="module">
        import('https://esm.sh/@solana/spl-token@0.3.9').then(splToken => {
            window.splToken = splToken;
            window.dispatchEvent(new Event('splTokenLoaded'));
        }).catch(err => console.error('SPL token load error:', err));
    </script>
</head>
<body class="coinflip-page" style="width:100%;max-width:100%;margin:0;padding:0;">
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo">
                    <a href="#" id="coinflip-logo-link"><img src="images/logo.png" alt="1000s" class="logo-img"></a>
                    <a href="#" class="exit-home-btn" title="Back to Casino">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </a>
                </div>
                <div class="nav-links">
                    <div id="wallet-button-container" class="wallet-button-container">
                        <button id="connect-wallet" class="wallet-connect-btn">Connect Wallet</button>
                        <div id="wallet-info" class="wallet-info" style="display: none;">
                            <span id="wallet-address"></span>
                            <button id="disconnect-wallet" class="wallet-disconnect-btn">Disconnect</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="coinflip-container">
        <div class="coinflip-wrapper">
            <!-- Game Stats -->
            <div class="game-stats-bar">
                <div class="game-totals-header">
                    <span class="game-totals-header-text">GAME TOTALS</span>
                </div>
                <div class="grand-totals-row">
                    <div class="grand-total-item">
                        <span class="grand-total-label">FLIPS</span>
                        <span id="grand-total-flips" class="grand-total-value">0</span>
                    </div>
                    <div class="grand-total-item">
                        <span class="grand-total-label">WON</span>
                        <span id="grand-total-won" class="grand-total-value">0</span>
                    </div>
                </div>
                <div class="game-totals-divider"></div>
                <div class="game-stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Balance:</span>
                        <span id="token-balance" class="stat-value">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Won:</span>
                        <span id="total-won" class="stat-value">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Flips Remaining:</span>
                        <span id="flips-remaining" class="stat-value">0</span>
                    </div>
                    <div class="stat-item stat-item-buttons">
                        <button id="leaderboard-btn" class="btn-leaderboard-desktop" title="Leaderboard">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6.5,12h-4a.5.5,0,0,0-.5.5V20H7V12.5A.5.5,0,0,0,6.5,12Z" fill="currentColor"/>
                                <path d="M14,4H10a.5.5,0,0,0-.5.5V20h5V4.5A.5.5,0,0,0,14,4Z" fill="currentColor"/>
                                <path d="M21.5,8h-4a.5.5,0,0,0-.5.5V20h5V8.5A.5.5,0,0,0,21.5,8Z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main: coin + selection + flip -->
            <div class="coinflip-main">
                <div class="coin-area">
                    <div class="coin-flip-wrapper">
                        <img id="coin-image" src="images/knukl-heads.png" alt="Coin" class="coin-img">
                    </div>
                    <ul class="selection-list">
                        <li class="make-selection-text">Make your selection</li>
                        <li><button type="button" id="btn-heads" class="btn-selection" data-side="heads">Heads</button></li>
                        <li><button type="button" id="btn-tails" class="btn-selection" data-side="tails">Tails</button></li>
                    </ul>
                </div>
                <div id="flip-result" class="flip-result" style="display: none;">
                    <h2 id="flip-result-message"></h2>
                    <p id="flip-result-amount"></p>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-panel">
                <div class="inputs-row">
                    <div class="control-group">
                        <label for="cost-per-flip">Cost Per Flip:</label>
                        <select id="cost-per-flip" class="control-select">
                            <option value="100">100</option>
                            <option value="200">200</option>
                            <option value="300">300</option>
                            <option value="400">400</option>
                            <option value="500">500</option>
                            <option value="600">600</option>
                            <option value="700">700</option>
                            <option value="800">800</option>
                            <option value="900">900</option>
                            <option value="1000">1000</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="number-of-flips">Number of Flips:</label>
                        <select id="number-of-flips" class="control-select">
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                            <option value="40">40</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                </div>
                <div class="button-group">
                    <button id="purchase-flips" class="btn btn-primary" disabled>BUY</button>
                    <button id="flip-button" class="btn btn-spin" disabled>FLIP</button>
                    <button id="withdraw-button" class="btn btn-withdraw" disabled>COLLECT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="leaderboard-modal">
        <div class="leaderboard-modal-content">
            <div class="leaderboard-modal-header">
                <h2>Leaderboard</h2>
                <button id="close-leaderboard-modal" class="close-modal-btn">&times;</button>
            </div>
            <div class="leaderboard-modal-body">
                <div class="leaderboard-sort">
                    <label for="leaderboard-sort">Sort by:</label>
                    <select id="leaderboard-sort">
                        <option value="flips">Most Flips</option>
                        <option value="won">Most Won</option>
                    </select>
                </div>
                <div id="leaderboard-loading" class="leaderboard-loading" style="display: none;">Loading...</div>
                <div id="leaderboard-list" class="leaderboard-list"></div>
            </div>
        </div>
    </div>

    <!-- Message modal -->
    <div id="message-modal" class="message-modal">
        <div class="message-modal-content">
            <div class="message-modal-header">
                <h2 id="message-modal-title">Message</h2>
                <button id="close-message-modal" class="close-modal-btn" type="button">&times;</button>
            </div>
            <div class="message-modal-body">
                <p id="message-modal-text"></p>
                <a id="message-modal-tx-link" class="message-modal-tx-link" href="#" target="_blank" rel="noopener noreferrer" style="display: none;">View transaction</a>
            </div>
            <div class="message-modal-footer">
                <button id="message-modal-ok" class="btn btn-primary" type="button">OK</button>
            </div>
        </div>
    </div>

    <script src="coinflip.js"></script>
</body>
</html>
